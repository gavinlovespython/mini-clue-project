<!DOCTYPE html>
<html>
<head>
  <title>clue demo</title>
  <link rel="stylesheet" href="demo.css">
</head>
<body>

  <header>
    <h1>clue picker demo</h1>
  </header>

  <main class="container">
    <button id="pick">pick a clue</button>
    <p id="result"></p>
  </main>

  <footer>
    <p>mini-clue-project demo</p>
  </footer>

  <script type="module">
    import { pickClue } from './engine.js';

    const clues = [
      "red door",
      "broken window",
      "footprints",
      "mysterious note"
    ];

    document.getElementById("pick").onclick = () => {
      const r = pickClue(clues);
      const result = document.getElementById("result");
      result.textContent = r;

      if (r.includes("rare")) {
        result.style.color = "purple";
      } else {
        result.style.color = "black";
      }
    };
  </script>

</body>
</html>
